<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Simulator — Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1a1d27;
            border-bottom: 1px solid #2d3148;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        header .badge {
            background: #e53e3e22;
            color: #fc8181;
            border: 1px solid #e53e3e44;
            border-radius: 20px;
            font-size: 12px;
            padding: 2px 10px;
        }

        .refresh-btn {
            margin-left: auto;
            background: #2d3148;
            border: 1px solid #3d4268;
            color: #a0aec0;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .refresh-btn:hover {
            background: #3d4268;
            color: #fff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            padding: 28px 32px 0;
        }

        .stat-card {
            background: #1a1d27;
            border: 1px solid #2d3148;
            border-radius: 10px;
            padding: 20px 24px;
        }

        .stat-card .label {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card.total .value {
            color: #e2e8f0;
        }

        .stat-card.opens .value {
            color: #68d391;
        }

        .stat-card.clicks .value {
            color: #fc8181;
        }

        .stat-card.rate .value {
            color: #f6ad55;
        }

        .table-wrap {
            padding: 24px 32px 40px;
        }

        .table-wrap h2 {
            font-size: 14px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1d27;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3148;
        }

        thead th {
            background: #222537;
            padding: 12px 18px;
            text-align: left;
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        tbody tr {
            border-top: 1px solid #2d3148;
            transition: background 0.1s;
        }

        tbody tr:hover {
            background: #222537;
        }

        tbody td {
            padding: 13px 18px;
            font-size: 14px;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .type-open {
            background: #276749;
            color: #9ae6b4;
        }

        .type-click {
            background: #742a2a;
            color: #feb2b2;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #4a5568;
        }

        .empty .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        #live-dot {
            width: 8px;
            height: 8px;
            background: #68d391;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>

<header>
    <div id="live-dot"></div>
    <h1>Phishing Simulator</h1>
    <span class="badge">LIVE</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</header>

<div class="stats">
    <div class="stat-card total">
        <div class="label">Total Events</div>
        <div class="value" id="s-total">—</div>
    </div>
    <div class="stat-card opens">
        <div class="label">Opened Email</div>
        <div class="value" id="s-opens">—</div>
    </div>
    <div class="stat-card clicks">
        <div class="label">Clicked Link</div>
        <div class="value" id="s-clicks">—</div>
    </div>
    <div class="stat-card rate">
        <div class="label">Click Rate</div>
        <div class="value" id="s-rate">—</div>
    </div>
</div>

<div class="table-wrap">
    <h2>Event Log</h2>
    <table>
        <thead>
        <tr>
            <th>Employee</th>
            <th>Email</th>
            <th>Action</th>
            <th>IP</th>
            <th>Time</th>
        </tr>
        </thead>
        <tbody id="events-body">
        <tr>
            <td colspan="5" class="empty">
                <div class="icon">🎣</div>
                Waiting for events...
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch('/api/events');
            const events = await res.json();

            // Статистика
            const opens = events.filter(e => e.type === 'open').length;
            const clicks = events.filter(e => e.type === 'click').length;
            const uniqueOpens = new Set(events.filter(e => e.type === 'open').map(e => e.email)).size;
            const rate = uniqueOpens > 0 ? Math.round((clicks / uniqueOpens) * 100) : 0;

            document.getElementById('s-total').textContent = events.length;
            document.getElementById('s-opens').textContent = opens;
            document.getElementById('s-clicks').textContent = clicks;
            document.getElementById('s-rate').textContent = rate + '%';

            // Таблица
            const tbody = document.getElementById('events-body');
            if (events.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty"><div class="icon">🎣</div>Waiting for events...</td></tr>`;
                return;
            }

            tbody.innerHTML = [...events].reverse().map(e => `
        <tr>
          <td>${e.name}</td>
          <td>${e.email}</td>
          <td><span class="type-badge type-${e.type}">${e.type === 'click' ? '🎣 Clicked' : '👁️ Opened'}</span></td>
          <td>${e.ip}</td>
          <td>${new Date(e.time).toLocaleString('en-US')}</td>
        </tr>
      `).join('');
        } catch (err) {
            console.error('Ошибка загрузки:', err);
        }
    }

    loadData();
    setInterval(loadData, 5000); // обновляем каждые 5 секунд
</script>
</body>
</html>
